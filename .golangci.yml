# golangci-lint configuration for mishmesh.
# Run with: golangci-lint run  (or: make lint)
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - errorlint
    - unconvert
    - whitespace

linters-settings:
  goimports:
    local-prefixes: github.com/mishmesh/mishmesh

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
